name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm --workspace apps/web run qa:primary
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:4000
          RAILWAY_API_URL: http://localhost:4000
      - name: Primary room-flow contract gate (builder->editor->publish/share surface)
        run: |
          npm --workspace apps/web run start -- --hostname 127.0.0.1 --port 3100 >/tmp/plan2space-web.log 2>&1 &
          WEB_PID=$!
          cleanup() {
            kill "${WEB_PID}" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          for i in $(seq 1 60); do
            if curl -fs http://127.0.0.1:3100 >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done
          E2E_ROOM_FLOW_STRICT=1 npm --workspace apps/web run primary:e2e:room-flow:strict -- --base-url=http://127.0.0.1:3100
      - name: Optional primary room-flow full gate (save/publish/shared/gallery/community)
        env:
          E2E_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
          E2E_SUPABASE_ANON_KEY: ${{ secrets.E2E_SUPABASE_ANON_KEY }}
          E2E_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.E2E_SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "${E2E_SUPABASE_URL}" ] || [ -z "${E2E_SUPABASE_ANON_KEY}" ] || [ -z "${E2E_SUPABASE_SERVICE_ROLE_KEY}" ]; then
            echo "Primary full-flow gate skipped (missing E2E Supabase secrets)."
            exit 0
          fi
          npm --workspace apps/web run start -- --hostname 127.0.0.1 --port 3100 >/tmp/plan2space-web-full.log 2>&1 &
          WEB_PID=$!
          cleanup() {
            kill "${WEB_PID}" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          for i in $(seq 1 60); do
            if curl -fs http://127.0.0.1:3100 >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done
          NEXT_PUBLIC_SUPABASE_URL="${E2E_SUPABASE_URL}" \
          NEXT_PUBLIC_SUPABASE_ANON_KEY="${E2E_SUPABASE_ANON_KEY}" \
          SUPABASE_SERVICE_ROLE_KEY="${E2E_SUPABASE_SERVICE_ROLE_KEY}" \
          npm --workspace apps/web run primary:e2e:room-flow:full -- --base-url=http://127.0.0.1:3100
      - run: npm run check:web-boundary
      - name: Optional preview runtime smoke (Vercel ↔ Railway boundary)
        env:
          E2E_VERCEL_PREVIEW_URL: ${{ secrets.E2E_VERCEL_PREVIEW_URL }}
          E2E_RAILWAY_API_URL: ${{ secrets.E2E_RAILWAY_API_URL }}
        run: |
          if [ -z "${E2E_VERCEL_PREVIEW_URL}" ] || [ -z "${E2E_RAILWAY_API_URL}" ]; then
            echo "Preview runtime smoke skipped (missing E2E_VERCEL_PREVIEW_URL or E2E_RAILWAY_API_URL)."
            exit 0
          fi
          npm --workspace apps/web run smoke:preview-runtime -- --url=${E2E_VERCEL_PREVIEW_URL} --mode=must-not-embed --expected=${E2E_RAILWAY_API_URL}

  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Detect api workspace
        id: api_guard
        run: |
          if [ -f "apps/api/package.json" ]; then
            echo "has_api=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_api=false" >> "$GITHUB_OUTPUT"
            echo "apps/api workspace not found. Skipping api job steps."
          fi
      - if: steps.api_guard.outputs.has_api == 'true'
        run: npm --workspace apps/api run typecheck --if-present
      - if: steps.api_guard.outputs.has_api == 'true'
        run: npm --workspace apps/api run test --if-present

  worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Detect worker workspace
        id: worker_guard
        run: |
          if [ -f "apps/worker/package.json" ]; then
            echo "has_worker=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_worker=false" >> "$GITHUB_OUTPUT"
            echo "apps/worker workspace not found. Skipping worker job steps."
          fi
      - if: steps.worker_guard.outputs.has_worker == 'true'
        run: npm --workspace apps/worker run typecheck --if-present
      - if: steps.worker_guard.outputs.has_worker == 'true'
        run: npm --workspace apps/worker run test --if-present
